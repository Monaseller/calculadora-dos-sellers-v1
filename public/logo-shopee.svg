<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 40" width="110" height="40">
  <!-- Ícone sacola Shopee -->
  <g transform="translate(4, 4)">
    <!-- Alça da sacola -->
    <path d="M8 10 Q8 4 16 4 Q24 4 24 10" stroke="#EE4D2D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Corpo da sacola -->
    <rect x="3" y="10" width="26" height="20" rx="3" fill="#EE4D2D"/>
    <!-- Sorriso (símbolo Shopee) -->
    <path d="M10 18 Q16 23 22 18" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Olhos -->
    <circle cx="12" cy="15" r="1.5" fill="#fff"/>
    <circle cx="20" cy="15" r="1.5" fill="#fff"/>
  </g>
  <!-- Texto "shopee" -->
  <text x="70" y="22" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#EE4D2D" text-anchor="middle" dominant-baseline="middle" letter-spacing="0.3">shopee</text>
</svg>
